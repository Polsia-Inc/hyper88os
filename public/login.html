<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión — Polsia ES</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #111118;
            --bg-card: #16161f;
            --border: #1e1e2a;
            --text-primary: #e8e8ed;
            --text-secondary: #8888a0;
            --text-dim: #55556a;
            --accent: #00e599;
            --accent-dim: #00e59920;
            --red: #ff4466;
        }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }
        .grid-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 60px 60px;
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }
        .auth-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 24px;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .logo {
            font-weight: 700;
            font-size: 20px;
            letter-spacing: -0.5px;
            margin-bottom: 32px;
        }
        .logo span { color: var(--accent); }
        .logo a {
            color: inherit;
            text-decoration: none;
        }
        .auth-header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }
        .auth-header p {
            color: var(--text-secondary);
            font-size: 14px;
        }
        .auth-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }
        .form-group input::placeholder {
            color: var(--text-dim);
        }
        .error-msg {
            background: #ff446615;
            border: 1px solid #ff446640;
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--red);
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }
        .error-msg.visible { display: block; }
        .btn {
            width: 100%;
            padding: 14px 20px;
            border-radius: 8px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            font-size: 15px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--accent);
            color: var(--bg-primary);
        }
        .btn:hover {
            background: #00cc88;
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(0, 229, 153, 0.3);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-secondary);
        }
        .auth-footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 13px;
            margin-top: 20px;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="auth-container">
        <div class="auth-header">
            <div class="logo"><a href="/">polsia<span>.es</span></a></div>
            <h1>Iniciar Sesión</h1>
            <p>Accede a tu panel de control</p>
        </div>

        <div class="auth-card">
            <div class="error-msg" id="errorMsg"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" placeholder="tu@empresa.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Tu contraseña" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn" id="submitBtn">Entrar</button>
            </form>
        </div>

        <div class="auth-footer">
            ¿No tienes cuenta? <a href="/signup">Crear cuenta</a>
        </div>
        <div style="text-align:center">
            <a href="/" class="back-link">← Volver al inicio</a>
        </div>
    </div>

    <script>
    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorMsg.classList.remove('visible');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Entrando...';

        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value
                })
            });

            const data = await res.json();

            if (res.ok) {
                window.location.href = '/dashboard';
            } else {
                errorMsg.textContent = data.error || 'Correo o contraseña incorrectos';
                errorMsg.classList.add('visible');
            }
        } catch (err) {
            errorMsg.textContent = 'Error de conexión. Inténtalo de nuevo.';
            errorMsg.classList.add('visible');
        }

        submitBtn.disabled = false;
        submitBtn.textContent = 'Entrar';
    });
    </script>
</body>
</html>
