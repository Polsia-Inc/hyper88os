<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentes — Polsia ES</title>
    <script src="/theme.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #111118;
            --bg-card: #16161f;
            --border: #1e1e2a;
            --text-primary: #e8e8ed;
            --text-secondary: #8888a0;
            --text-dim: #55556a;
            --accent: #00e599;
            --accent-dim: #00e59920;
            --amber: #ffb800;
            --red: #ff4466;
            --blue: #4488ff;
            --purple: #aa66ff;
            --sidebar-width: 260px;
        }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }

        /* Layout */
        .app-layout { display: flex; min-height: 100vh; }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0; left: 0; bottom: 0;
            z-index: 10;
        }
        .sidebar-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-logo { font-weight: 700; font-size: 18px; letter-spacing: -0.5px; }
        .sidebar-logo span { color: var(--accent); }
        .sidebar-nav { flex: 1; padding: 16px 12px; }
        .nav-section { margin-bottom: 24px; }
        .nav-section-title {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-dim);
            padding: 0 12px;
            margin-bottom: 8px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.15s;
            cursor: pointer;
        }
        .nav-item:hover { background: var(--bg-card); color: var(--text-primary); }
        .nav-item.active { background: var(--accent-dim); color: var(--accent); }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            padding: 32px 40px;
            max-width: 1400px;
        }

        /* Header */
        .page-header {
            margin-bottom: 32px;
        }
        .page-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .page-subtitle {
            font-size: 16px;
            color: var(--text-secondary);
        }

        /* Agent Grid */
        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        /* Agent Card */
        .agent-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            transition: all 0.2s;
            cursor: pointer;
        }
        .agent-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }
        .agent-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }
        .agent-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
            text-transform: capitalize;
        }
        .agent-type {
            font-size: 12px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .agent-status {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }
        .agent-status.active {
            background: var(--accent-dim);
            color: var(--accent);
        }
        .agent-status.inactive {
            background: var(--bg-secondary);
            color: var(--text-dim);
        }
        .agent-description {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .agent-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }
        .stat {
            text-align: center;
        }
        .stat-value {
            font-size: 22px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 4px;
        }
        .stat-label {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .agent-capabilities {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .capability-tag {
            padding: 4px 8px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 11px;
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
        }

        /* Agent Detail Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 32px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 24px;
        }
        .modal-close {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.15s;
        }
        .modal-close:hover {
            background: var(--bg-primary);
            color: var(--text-primary);
        }
        .execution-history {
            margin-top: 24px;
        }
        .execution-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .execution-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .execution-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .execution-status {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }
        .execution-status.success {
            background: var(--accent-dim);
            color: var(--accent);
        }
        .execution-status.failed {
            background: rgba(255,68,102,0.15);
            color: var(--red);
        }
        .execution-status.running {
            background: rgba(68,136,255,0.15);
            color: var(--blue);
        }
        .execution-meta {
            font-size: 12px;
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">Polsia<span>.es</span></div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">Plataforma</div>
                    <a href="/dashboard" class="nav-item">📊 Dashboard</a>
                    <a href="/tasks" class="nav-item">✅ Tareas</a>
                    <a href="/agents" class="nav-item active">🤖 Agentes</a>
                </div>
                <div class="nav-section">
                    <div class="nav-section-title">Configuración</div>
                    <a href="/facturacion" class="nav-item">💳 Facturación</a>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title">Agentes</h1>
                <p class="page-subtitle">Sistema de agentes autónomos para Polsia ES</p>
            </div>

            <div id="loading" class="loading">
                <div class="spinner"></div>
                <div>Cargando agentes...</div>
            </div>

            <div id="agents-container" class="agents-grid" style="display: none;"></div>
        </main>
    </div>

    <!-- Agent Detail Modal -->
    <div id="agent-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div>
                    <h2 class="page-title" id="modal-agent-name"></h2>
                    <p class="page-subtitle" id="modal-agent-description"></p>
                </div>
                <button class="modal-close" onclick="closeModal()">Cerrar</button>
            </div>

            <div class="agent-stats" id="modal-agent-stats"></div>

            <div style="margin-top: 24px;">
                <h3 style="font-size: 16px; font-weight: 600; margin-bottom: 12px;">Capacidades</h3>
                <div class="agent-capabilities" id="modal-agent-capabilities"></div>
            </div>

            <div style="margin-top: 24px;">
                <h3 style="font-size: 16px; font-weight: 600; margin-bottom: 12px;">Requisitos MCP</h3>
                <div class="agent-capabilities" id="modal-agent-mcps"></div>
            </div>

            <div class="execution-history">
                <h3 style="font-size: 16px; font-weight: 600; margin-bottom: 12px;">Historial de Ejecución</h3>
                <div id="modal-execution-history"></div>
            </div>
        </div>
    </div>

    <script>
        let allAgents = [];

        async function loadAgents() {
            try {
                const res = await fetch('/api/agents');
                const data = await res.json();

                if (!res.ok) throw new Error(data.error);

                allAgents = data.agents;
                renderAgents();

                document.getElementById('loading').style.display = 'none';
                document.getElementById('agents-container').style.display = 'grid';
            } catch (err) {
                console.error('Error loading agents:', err);
                document.getElementById('loading').innerHTML = '<div style="color: var(--red);">Error al cargar agentes</div>';
            }
        }

        function renderAgents() {
            const container = document.getElementById('agents-container');
            container.innerHTML = allAgents.map(agent => {
                const stats = agent.stats || {};
                const totalExec = parseInt(stats.total_executions) || 0;
                const successExec = parseInt(stats.successful_executions) || 0;
                const failedExec = parseInt(stats.failed_executions) || 0;
                const successRate = totalExec > 0 ? Math.round((successExec / totalExec) * 100) : 0;

                const capabilities = Array.isArray(agent.capabilities) ? agent.capabilities : [];
                const displayCapabilities = capabilities.slice(0, 5);

                return `
                    <div class="agent-card" onclick="showAgentDetail(${agent.id})">
                        <div class="agent-header">
                            <div>
                                <div class="agent-title">${agent.name}</div>
                                <div class="agent-type">${agent.type}</div>
                            </div>
                            <div class="agent-status ${agent.is_active ? 'active' : 'inactive'}">
                                ${agent.is_active ? 'ACTIVO' : 'INACTIVO'}
                            </div>
                        </div>

                        <div class="agent-description">${agent.description || 'Sin descripción'}</div>

                        <div class="agent-stats">
                            <div class="stat">
                                <div class="stat-value">${totalExec}</div>
                                <div class="stat-label">Ejecuciones</div>
                            </div>
                            <div class="stat">
                                <div class="stat-value" style="color: var(--accent);">${successRate}%</div>
                                <div class="stat-label">Éxito</div>
                            </div>
                            <div class="stat">
                                <div class="stat-value" style="color: var(--red);">${failedExec}</div>
                                <div class="stat-label">Fallos</div>
                            </div>
                        </div>

                        <div class="agent-capabilities">
                            ${displayCapabilities.map(cap =>
                                `<span class="capability-tag">${cap}</span>`
                            ).join('')}
                            ${capabilities.length > 5 ? `<span class="capability-tag">+${capabilities.length - 5} más</span>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function showAgentDetail(agentId) {
            try {
                const res = await fetch(`/api/agents/${agentId}`);
                const data = await res.json();

                if (!res.ok) throw new Error(data.error);

                const { agent, stats, history } = data;

                document.getElementById('modal-agent-name').textContent = agent.name;
                document.getElementById('modal-agent-description').textContent = agent.description || 'Sin descripción';

                // Stats
                const totalExec = parseInt(stats.total_executions) || 0;
                const successExec = parseInt(stats.successful_executions) || 0;
                const failedExec = parseInt(stats.failed_executions) || 0;
                const runningExec = parseInt(stats.running_executions) || 0;
                const avgDuration = stats.avg_duration_ms ? Math.round(stats.avg_duration_ms / 1000) : 0;

                document.getElementById('modal-agent-stats').innerHTML = `
                    <div class="stat">
                        <div class="stat-value">${totalExec}</div>
                        <div class="stat-label">Total</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" style="color: var(--accent);">${successExec}</div>
                        <div class="stat-label">Exitosos</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" style="color: var(--red);">${failedExec}</div>
                        <div class="stat-label">Fallidos</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" style="color: var(--blue);">${runningExec}</div>
                        <div class="stat-label">Ejecutando</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value">${avgDuration}s</div>
                        <div class="stat-label">Promedio</div>
                    </div>
                `;

                // Capabilities
                const capabilities = Array.isArray(agent.capabilities) ? agent.capabilities : [];
                document.getElementById('modal-agent-capabilities').innerHTML = capabilities
                    .map(cap => `<span class="capability-tag">${cap}</span>`)
                    .join('');

                // MCP Requirements
                const mcps = Array.isArray(agent.mcp_requirements) ? agent.mcp_requirements : [];
                document.getElementById('modal-agent-mcps').innerHTML = mcps
                    .map(mcp => `<span class="capability-tag">${mcp}</span>`)
                    .join('');

                // Execution History
                document.getElementById('modal-execution-history').innerHTML = history.length > 0
                    ? history.map(exec => {
                        const statusClass = exec.success === true ? 'success' : exec.success === false ? 'failed' : 'running';
                        const statusText = exec.success === true ? 'EXITOSO' : exec.success === false ? 'FALLIDO' : 'EJECUTANDO';
                        const duration = exec.duration_ms ? `${Math.round(exec.duration_ms / 1000)}s` : '-';
                        const date = new Date(exec.started_at).toLocaleString('es-ES');

                        return `
                            <div class="execution-item">
                                <div class="execution-header">
                                    <div class="execution-title">${exec.task_title || `Tarea #${exec.task_id}`}</div>
                                    <div class="execution-status ${statusClass}">${statusText}</div>
                                </div>
                                <div class="execution-meta">
                                    ${date} · ${duration} · ${exec.task_tag || 'general'}
                                </div>
                                ${exec.error_message ? `<div style="color: var(--red); font-size: 12px; margin-top: 8px;">${exec.error_message}</div>` : ''}
                            </div>
                        `;
                    }).join('')
                    : '<div style="color: var(--text-dim); text-align: center; padding: 20px;">Sin historial de ejecución</div>';

                document.getElementById('agent-modal').classList.add('active');
            } catch (err) {
                console.error('Error loading agent detail:', err);
                alert('Error al cargar detalles del agente');
            }
        }

        function closeModal() {
            document.getElementById('agent-modal').classList.remove('active');
        }

        // Close modal on outside click
        document.getElementById('agent-modal').addEventListener('click', (e) => {
            if (e.target.id === 'agent-modal') closeModal();
        });

        // Load agents on page load
        loadAgents();
    </script>
</body>
</html>
